<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="test.css">
  <link href='https://fonts.googleapis.com/css?family=Kanit&subset=thai,latin' rel='stylesheet' type='text/css'>
</head>
<body>
  <!--Script-->
  <script src="https://kit.fontawesome.com/b1036c605e.js" crossorigin="anonymous"></script>
  <script src="script.js"></script>
  <script src="./web-product/image"></script>
  <!--Script-->
  <!--header-->
  <header class="top-header">
    <div class="navbar">
      <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
      </div>
  
      <div class="menu" id="menu">
        <a href="index.html" class="menu-item">
          <i class="fa-solid fa-house"></i>Home
        </a>
        <a href="product.html" class="menu-item">
          <i class="fa-solid fa-shop"></i>Products
        </a>
        <a href="contact.html" class="menu-item">
          <i class="fa-solid fa-headphones"></i>Top Up
        </a>
        <a href="contact.html" class="menu-item">
          <i class="fa-solid fa-headphones"></i>Contact
        </a>
        <a href="login.html" class="menu-item">
          <i class="fa-solid fa-user"></i>Log In
        </a>
        <a href="new-user.html" class="menu-item">
          <i class="fa-solid fa-user-plus"></i>Sign Up
        </a>
      </div>
    </div>
  </header>
  <!--end header-->

  <div class="main-menu">
    <div class="breadcrumb-section">
      <a class="breadcrumb-title" href="#">Home</a>
      <a class="breadcrumb-title"> ></a>
      <a class="breadcrumb-title" href="#">Valorant</a>
      <a class="breadcrumb-title"> ></a>
      <a class="breadcrumb-title page" href="#">Top up Valorant</a>
    </div>
    <div class="main-product">
      <div class="section-img-product">
        <img class="img-product" src="1.png">
      </div>
      <div class="section-recommend-product">
        <h2 class="title-name">Test Product</h2>
        <h4 class="title-price">฿999 / item</h4>
        <h4 class="title-amount">Total: <span id="totalStock">10</span> items</h4>

        <div class="section-details">
          <p class="title-head">Product Details</p>
          <div class="box-details">
            <p class="title-details">Test</p>
            <p class="title-details">30-Day Warranty</p>
          </div>
        </div>

        <div class="quantity-container">
          <p class="title">Quantity</p>
        
          <div class="qty-box">
            <button id="minusBtn" onclick="decrease()">-</button>
        
            <input type="text" id="quantity" value="0" readonly>
        
            <button id="plusBtn" onclick="increase()">+</button>
          </div>
        </div>

        <div class="discount-section">
          <p class="discount-title">Discount</p>
        
          <div class="discount-box">
            <input type="text" id="discountInput" placeholder="Enter your discount code">
            <button onclick="checkDiscount()">Check</button>
          </div>
        
          <button id="outOfStockBtn" class="out-of-stock">
            Out of Stock 🎁
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
